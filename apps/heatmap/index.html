<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Who Am I — Personal Heatmap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-y: auto;
    }

    #app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 100px;
    }

    /* ── Header ────────────────────────────────────────────────── */

    header {
      text-align: center;
      margin-bottom: 44px;
    }

    header h1 {
      font-size: 1.6rem;
      color: #e94560;
      margin-bottom: 8px;
    }

    header p {
      color: #888;
      font-size: 0.9rem;
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Tone Toggle ───────────────────────────────────────────── */

    .tone-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .tone-toggle label {
      font-size: 0.75rem;
      color: #666;
      cursor: pointer;
      padding: 5px 12px;
      border-radius: 16px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .tone-toggle label.active {
      color: #e0e0e0;
      border-color: #0f3460;
      background: rgba(15, 52, 96, 0.4);
    }

    .tone-toggle .separator {
      width: 1px;
      height: 14px;
      background: #333;
    }

    /* ── Symptom Grid ──────────────────────────────────────────── */

    #symptom-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 48px;
    }

    .symptom-tile {
      padding: 16px;
      border-radius: 12px;
      border: 2px solid #0f3460;
      background: rgba(255, 107, 107, 0.02);
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      user-select: none;
    }

    .symptom-tile:hover {
      border-color: rgba(255, 107, 107, 0.35);
      background: rgba(255, 107, 107, 0.05);
      transform: translateY(-1px);
    }

    .symptom-tile.selected {
      border-color: #ff6b6b;
      background: rgba(255, 107, 107, 0.1);
    }

    .symptom-tile.selected::after {
      content: '✓';
      position: absolute;
      top: 8px;
      right: 10px;
      color: #ff6b6b;
      font-size: 1rem;
      font-weight: bold;
    }

    .symptom-tile h3 {
      font-size: 0.82rem;
      color: #ff6b6b;
      line-height: 1.35;
      margin-bottom: 5px;
    }

    .symptom-tile p {
      font-size: 0.7rem;
      color: #666;
      line-height: 1.35;
    }

    /* ── Section Headers ───────────────────────────────────────── */

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .section-header h2 {
      font-size: 1.1rem;
      white-space: nowrap;
    }

    .section-header .badge {
      font-size: 0.7rem;
      color: #666;
      background: #0f3460;
      padding: 3px 10px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .section-header .line {
      flex: 1;
      height: 1px;
      background: #0f3460;
    }

    /* ── Results Area ──────────────────────────────────────────── */

    #results {
      display: none;
      animation: fadeIn 0.4s ease;
    }

    #results.visible {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Cause Heatmap ─────────────────────────────────────────── */

    #cause-heatmap {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
      margin-bottom: 48px;
    }

    .cause-tile {
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .cause-tile:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .cause-tile .cause-title {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .cause-tile .cause-heat {
      font-size: 0.65rem;
      opacity: 0.7;
    }

    .cause-tile .heat-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      border-radius: 0 0 10px 10px;
      background: #feca57;
      transition: width 0.5s ease;
    }

    /* ── Insight Tiles ─────────────────────────────────────────── */

    #insight-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
      margin-bottom: 48px;
    }

    .insight-tile {
      padding: 18px;
      border-radius: 10px;
      border: 1px solid rgba(162, 155, 254, 0.2);
      background: rgba(162, 155, 254, 0.03);
      transition: all 0.25s ease;
    }

    .insight-tile:hover {
      border-color: rgba(162, 155, 254, 0.35);
      background: rgba(162, 155, 254, 0.06);
    }

    .insight-tile .insight-illustration {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .insight-tile h4 {
      font-size: 0.82rem;
      color: #a29bfe;
      margin-bottom: 8px;
    }

    .insight-tile .insight-body {
      font-size: 0.78rem;
      color: #bbb;
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .insight-tile .concept-label {
      display: inline-block;
      font-size: 0.65rem;
      color: #777;
      background: rgba(162, 155, 254, 0.1);
      padding: 2px 8px;
      border-radius: 8px;
      margin-top: 4px;
    }

    .insight-tile .sophisticated-text {
      font-size: 0.72rem;
      color: #888;
      line-height: 1.5;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(162, 155, 254, 0.1);
      font-style: italic;
      display: none;
    }

    .insight-tile .sophisticated-text.visible {
      display: block;
    }

    .insight-tile .toggle-depth {
      font-size: 0.65rem;
      color: #a29bfe;
      cursor: pointer;
      margin-top: 8px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .insight-tile .toggle-depth:hover {
      opacity: 1;
    }

    /* ── Speak Button ──────────────────────────────────────────── */

    .speak-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border: 1px solid rgba(162, 155, 254, 0.2);
      border-radius: 50%;
      background: transparent;
      color: #a29bfe;
      font-size: 0.75rem;
      cursor: pointer;
      opacity: 0.5;
      transition: all 0.2s;
      vertical-align: middle;
      margin-left: 8px;
    }

    .speak-btn:hover {
      opacity: 1;
      border-color: rgba(162, 155, 254, 0.5);
      background: rgba(162, 155, 254, 0.08);
    }

    .speak-btn.speaking {
      opacity: 1;
      border-color: #e94560;
      color: #e94560;
      animation: pulse 1.2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* ── Pattern Tiles ─────────────────────────────────────────── */

    #pattern-section {
      margin-bottom: 48px;
    }

    #pattern-list {
      display: grid;
      gap: 12px;
    }

    .pattern-tile {
      padding: 18px;
      border-radius: 10px;
      border: 1px solid rgba(255, 159, 243, 0.2);
      background: rgba(255, 159, 243, 0.03);
      transition: all 0.25s ease;
    }

    .pattern-tile:hover {
      border-color: rgba(255, 159, 243, 0.35);
    }

    .pattern-tile h4 {
      font-size: 0.82rem;
      color: #ff9ff3;
      margin-bottom: 6px;
    }

    .pattern-tile p {
      font-size: 0.75rem;
      color: #999;
      line-height: 1.5;
    }

    .pattern-tile .loop-steps {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pattern-tile .loop-step {
      font-size: 0.65rem;
      color: #ccc;
      background: rgba(255, 159, 243, 0.08);
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255, 159, 243, 0.15);
    }

    .pattern-tile .loop-step::before {
      content: attr(data-num) '. ';
      color: #ff9ff3;
      font-weight: 600;
    }

    /* ── Action Tiles ──────────────────────────────────────────── */

    #action-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      margin-bottom: 48px;
    }

    .action-tile {
      padding: 18px;
      border-radius: 10px;
      border: 1px solid rgba(85, 239, 196, 0.2);
      background: rgba(85, 239, 196, 0.03);
      transition: all 0.25s ease;
    }

    .action-tile:hover {
      border-color: rgba(85, 239, 196, 0.35);
      background: rgba(85, 239, 196, 0.05);
    }

    .action-tile h4 {
      font-size: 0.82rem;
      color: #55efc4;
      margin-bottom: 8px;
    }

    .action-tile .experiment {
      font-size: 0.75rem;
      color: #bbb;
      line-height: 1.5;
      border-left: 2px solid rgba(85, 239, 196, 0.5);
      padding-left: 12px;
    }

    .action-tile .meta {
      font-size: 0.65rem;
      color: #555;
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    .action-tile .meta span {
      background: rgba(85, 239, 196, 0.08);
      padding: 2px 8px;
      border-radius: 8px;
    }

    /* ── Cause Detail Overlay ──────────────────────────────────── */

    #cause-detail {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 20, 0.88);
      z-index: 100;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    #cause-detail.visible {
      display: flex;
    }

    #cause-detail-content {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 14px;
      padding: 28px;
      max-width: 520px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }

    #cause-detail-content::-webkit-scrollbar { width: 4px; }
    #cause-detail-content::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

    .detail-close {
      position: absolute;
      top: 14px;
      right: 16px;
      cursor: pointer;
      color: #666;
      font-size: 1.2rem;
      transition: color 0.2s;
    }

    .detail-close:hover { color: #fff; }

    #cause-detail-content h3 {
      font-size: 1.1rem;
      color: #feca57;
      margin-bottom: 12px;
      padding-right: 30px;
    }

    #cause-detail-content .detail-summary {
      font-size: 0.88rem;
      color: #ccc;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    #cause-detail-content blockquote {
      border-left: 3px solid #feca57;
      padding-left: 12px;
      color: #999;
      font-style: italic;
      font-size: 0.85rem;
      margin-bottom: 14px;
    }

    #cause-detail-content .detail-explanation {
      font-size: 0.82rem;
      color: #aaa;
      line-height: 1.65;
    }

    /* ── Selection Bar ─────────────────────────────────────────── */

    #selection-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22, 33, 62, 0.96);
      border-top: 1px solid #0f3460;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 50;
      transition: transform 0.3s ease;
      transform: translateY(100%);
      backdrop-filter: blur(8px);
    }

    #selection-bar.visible {
      transform: translateY(0);
    }

    #selection-bar .sel-count {
      color: #ff6b6b;
      font-weight: 600;
      font-size: 0.85rem;
    }

    #selection-bar .sel-text {
      color: #777;
      font-size: 0.78rem;
    }

    #clear-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid #0f3460;
      background: transparent;
      color: #888;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    #clear-btn:hover {
      border-color: #e94560;
      color: #e94560;
    }

    /* ── Responsive ────────────────────────────────────────────── */

    @media (max-width: 600px) {
      #symptom-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      #cause-heatmap { grid-template-columns: 1fr; }
      #insight-list { grid-template-columns: 1fr; }
      #action-list { grid-template-columns: 1fr; }
      .symptom-tile { padding: 12px; }
      header h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>What resonates with you?</h1>
      <p>Pick the feelings you recognize. Scroll down to see what's behind them.</p>
    </header>

    <div class="tone-toggle">
      <label id="tone-plain" class="active" data-tone="plain">Plain language</label>
      <div class="separator"></div>
      <label id="tone-sophisticated" data-tone="sophisticated">Dig deeper</label>
    </div>

    <div id="symptom-grid"></div>

    <div id="results">
      <div class="section-header">
        <h2 style="color:#feca57">What's shaping this</h2>
        <span class="badge" id="cause-count"></span>
        <div class="line"></div>
      </div>
      <div id="cause-heatmap"></div>

      <div id="pattern-section">
        <div class="section-header">
          <h2 style="color:#ff9ff3">Loops you might be stuck in</h2>
          <span class="badge" id="pattern-count"></span>
          <div class="line"></div>
        </div>
        <div id="pattern-list"></div>
      </div>

      <div class="section-header">
        <h2 style="color:#a29bfe">Making sense of it</h2>
        <span class="badge" id="insight-count"></span>
        <div class="line"></div>
      </div>
      <div id="insight-list"></div>

      <div class="section-header">
        <h2 style="color:#55efc4">Small experiments to try</h2>
        <span class="badge" id="action-count"></span>
        <div class="line"></div>
      </div>
      <div id="action-list"></div>
    </div>
  </div>

  <div id="selection-bar">
    <span class="sel-count" id="sel-count-text">0 selected</span>
    <span class="sel-text">— scroll down to see your pattern</span>
    <button id="clear-btn">Clear all</button>
  </div>

  <div id="cause-detail">
    <div id="cause-detail-content">
      <span class="detail-close" id="cause-detail-close">✕</span>
      <div id="cause-detail-body"></div>
    </div>
  </div>

  <script src="heatmap.js"></script>
</body>
</html>
