<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Who Am I — Symptom Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      height: 100vh;
    }

    /* Symptom picker sidebar */
    #picker {
      width: 300px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    #picker-header {
      padding: 20px;
      border-bottom: 1px solid #0f3460;
    }

    #picker-header h1 {
      font-size: 1.1rem;
      color: #e94560;
      margin-bottom: 4px;
    }

    #picker-header p {
      font-size: 0.75rem;
      color: #666;
      line-height: 1.4;
    }

    #symptom-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    #symptom-list::-webkit-scrollbar { width: 5px; }
    #symptom-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }

    .symptom-card {
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.25s ease;
      background: rgba(255, 107, 107, 0.04);
    }

    .symptom-card:hover {
      background: rgba(255, 107, 107, 0.08);
      border-color: rgba(255, 107, 107, 0.2);
    }

    .symptom-card.active {
      background: rgba(255, 107, 107, 0.12);
      border-color: #ff6b6b;
    }

    .symptom-card h3 {
      font-size: 0.82rem;
      color: #ff6b6b;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .symptom-card p {
      font-size: 0.7rem;
      color: #666;
      line-height: 1.3;
    }

    /* Main canvas */
    #canvas-container {
      flex: 1;
      position: relative;
    }

    canvas { display: block; }

    /* Ring labels */
    #ring-labels {
      position: absolute;
      top: 50%;
      left: 50%;
      pointer-events: none;
      z-index: 2;
    }

    /* Detail popover */
    #detail {
      position: absolute;
      top: 50%;
      right: 24px;
      transform: translateY(-50%);
      width: 300px;
      max-height: 70vh;
      overflow-y: auto;
      background: rgba(22, 33, 62, 0.97);
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 20px;
      display: none;
      z-index: 20;
      font-size: 0.82rem;
      line-height: 1.5;
    }

    #detail::-webkit-scrollbar { width: 4px; }
    #detail::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

    #detail .close-btn {
      position: absolute;
      top: 12px;
      right: 14px;
      cursor: pointer;
      color: #666;
      font-size: 1rem;
    }

    #detail .close-btn:hover { color: #fff; }

    #detail .d-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    #detail h3 {
      font-size: 1rem;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    #detail .d-section {
      margin-bottom: 14px;
    }

    #detail .d-section h4 {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 4px;
    }

    #detail .d-section p {
      color: #bbb;
    }

    #detail blockquote {
      border-left: 3px solid #e94560;
      padding-left: 10px;
      color: #999;
      font-style: italic;
    }

    /* Prompt state */
    #prompt-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 5;
    }

    #prompt-text {
      font-size: 1rem;
      color: #444;
      text-align: center;
      line-height: 1.6;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(22, 33, 62, 0.95);
      border: 1px solid #0f3460;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      max-width: 220px;
      display: none;
      z-index: 100;
    }

    #tooltip .tt-type {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    /* Legend */
    #legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(22, 33, 62, 0.9);
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #0f3460;
      font-size: 0.65rem;
      z-index: 10;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }

    .legend-item:last-child { margin-bottom: 0; }

    .legend-ring {
      width: 16px;
      height: 2px;
      border-radius: 1px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="picker">
      <div id="picker-header">
        <h1>What are you feeling?</h1>
        <p>Pick a feeling. Watch what's behind it unfold — layer by layer.</p>
      </div>
      <div id="symptom-list"></div>
    </div>
    <div id="canvas-container">
      <canvas id="radial"></canvas>
      <div id="prompt-overlay">
        <div id="prompt-text">← Choose a feeling to begin exploring</div>
      </div>
      <div id="tooltip"></div>
      <div id="legend">
        <div class="legend-item"><div class="legend-ring" style="background:#ff6b6b"></div>Ring 1 — Symptom (center)</div>
        <div class="legend-item"><div class="legend-ring" style="background:#feca57"></div>Ring 2 — Causes</div>
        <div class="legend-item"><div class="legend-ring" style="background:#a29bfe"></div>Ring 3 — Insights</div>
        <div class="legend-item"><div class="legend-ring" style="background:#55efc4"></div>Ring 4 — Actions</div>
      </div>
      <div id="detail">
        <span class="close-btn" id="detail-close">✕</span>
        <div id="detail-body"></div>
      </div>
    </div>
  </div>

  <script src="radial.js"></script>
</body>
</html>
