<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Who Am I — River of Connections</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      height: 100vh;
    }

    /* Header */
    #header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      background: linear-gradient(to bottom, rgba(26, 26, 46, 0.95), transparent);
      z-index: 10;
      pointer-events: none;
    }

    #header h1 {
      font-size: 1.1rem;
      color: #e94560;
      pointer-events: auto;
    }

    #header h1 span {
      font-size: 0.75rem;
      color: #888;
      font-weight: normal;
      margin-left: 12px;
    }

    /* Main canvas */
    #canvas-container {
      flex: 1;
      position: relative;
    }

    canvas {
      display: block;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(22, 33, 62, 0.95);
      border: 1px solid #0f3460;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      max-width: 300px;
      display: none;
      z-index: 100;
      line-height: 1.4;
    }

    #tooltip .tt-type {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    #tooltip .tt-title {
      font-weight: 600;
      margin-bottom: 6px;
    }

    #tooltip .tt-desc {
      color: #aaa;
      font-size: 0.75rem;
    }

    /* Legend */
    #legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(22, 33, 62, 0.9);
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #0f3460;
      font-size: 0.7rem;
      z-index: 10;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .legend-row:last-child { margin-bottom: 0; }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* Column labels */
    .col-label {
      position: absolute;
      top: 60px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #555;
      z-index: 5;
    }

    /* Detail panel */
    #detail {
      position: absolute;
      top: 80px;
      right: 16px;
      width: 280px;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      background: rgba(22, 33, 62, 0.95);
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 16px;
      display: none;
      z-index: 10;
      font-size: 0.8rem;
    }

    #detail::-webkit-scrollbar { width: 4px; }
    #detail::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

    #detail .detail-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    #detail h3 {
      font-size: 0.95rem;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    #detail p {
      color: #aaa;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    #detail .close-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      cursor: pointer;
      color: #666;
      font-size: 1.1rem;
    }

    #detail .close-btn:hover { color: #fff; }

    #detail .flow-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #0f3460;
    }

    #detail .flow-section h4 {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 6px;
    }

    #detail .flow-item {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      margin: 2px 3px 2px 0;
      cursor: pointer;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    #detail .flow-item:hover { opacity: 1; }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="sankey"></canvas>
    </div>
  </div>

  <div id="header">
    <h1>River of Connections <span>Causes → Symptoms → Actions</span></h1>
  </div>

  <div id="tooltip"></div>

  <div id="legend">
    <div class="legend-row"><div class="legend-dot" style="background:#feca57"></div>Causes</div>
    <div class="legend-row"><div class="legend-dot" style="background:#ff6b6b"></div>Symptoms</div>
    <div class="legend-row"><div class="legend-dot" style="background:#55efc4"></div>Actions</div>
  </div>

  <div id="detail">
    <span class="close-btn" id="detail-close">✕</span>
    <div id="detail-body"></div>
  </div>

  <script src="sankey.js"></script>
</body>
</html>
